<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Skip link ── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 0;
      background: var(--accent);
      color: #fff;
      padding: 0.5rem 1rem;
      font-weight: 600;
      z-index: 200;
      border-radius: 0 0 6px 0;
      text-decoration: none;
    }
    .skip-link:focus { top: 0; }

    /* ── Theme variables ── */
    :root {
      --bg:             #1a1a2e;
      --sidebar-bg:     #0f1a30;
      --sidebar-border: #1e2d50;
      --card-bg:        #16213e;
      --card-hover:     #1e3060;
      --text:           #eee;
      --text-muted:     #9aabbb;
      --accent:         #e94560;
      --accent-hover:   #c73652;
      --status-color:   #a8dadc;
      --sidebar-label:  #a8dadc;
      --cell-hover:     #0f3460;
      --focus-ring:     #fff;
      --badge-prog-bg:  #1e3a5f; --badge-prog-fg: #a8dadc;
      --badge-x-bg:     #3a1020; --badge-x-fg:   #f07a8e;
      --badge-o-bg:     #0d3020; --badge-o-fg:   #4ade80;
      --badge-draw-bg:  #2a2a2a; --badge-draw-fg: #c5ccd6;
      --toggle-bg:      #16213e;
      --toggle-border:  #2a3a60;
    }

    [data-theme="light"] {
      --bg:             #f0f4f8;
      --sidebar-bg:     #e2e8f0;
      --sidebar-border: #cbd5e1;
      --card-bg:        #fff;
      --card-hover:     #e8f0fe;
      --text:           #1a202c;
      --text-muted:     #4a5568;
      --accent:         #c8173a;
      --accent-hover:   #a01030;
      --status-color:   #0369a1;
      --sidebar-label:  #0369a1;
      --cell-hover:     #dbeafe;
      --focus-ring:     #0369a1;
      --badge-prog-bg:  #dbeafe; --badge-prog-fg: #1e40af;
      --badge-x-bg:     #fee2e2; --badge-x-fg:   #991b1b;
      --badge-o-bg:     #dcfce7; --badge-o-fg:   #166534;
      --badge-draw-bg:  #e2e8f0; --badge-draw-fg: #374151;
      --toggle-bg:      #fff;
      --toggle-border:  #cbd5e1;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      transition: background 0.25s, color 0.25s;
    }

    /* ── Focus styles (WCAG 2.4.7 / 2.4.11) ── */
    :focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 3px;
    }

    /* ── Theme toggle ── */
    #theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--toggle-bg);
      border: 1.5px solid var(--toggle-border);
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      z-index: 100;
    }
    #theme-toggle:hover { border-color: var(--accent); }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      gap: 0.75rem;
      overflow-y: auto;
      transition: background 0.25s, border-color 0.25s;
    }

    #sidebar h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--sidebar-label);
      margin-bottom: 0.25rem;
    }

    .game-entry {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
      border: 2px solid transparent;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .game-entry:hover { background: var(--card-hover); }
    .game-entry[aria-current="true"] { border-color: var(--accent); }

    .game-entry .game-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-entry .game-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .game-entry .game-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      margin-top: 0.3rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge-IN_PROGRESS { background: var(--badge-prog-bg); color: var(--badge-prog-fg); }
    .badge-X_WINS      { background: var(--badge-x-bg);    color: var(--badge-x-fg); }
    .badge-O_WINS      { background: var(--badge-o-bg);    color: var(--badge-o-fg); }
    .badge-DRAW        { background: var(--badge-draw-bg); color: var(--badge-draw-fg); }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: 2px; color: var(--accent); }

    #game-title {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      height: 1.4rem;
    }

    /* Live region for screen readers */
    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: var(--status-color);
    }

    /* ── Board (WCAG 1.3.1 – meaningful structure) ── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: var(--card-bg);
      border: 2px solid transparent;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      font-family: inherit;
      color: var(--text);
      padding: 0;
    }
    .cell:hover:not(:disabled) { background: var(--cell-hover); transform: scale(1.04); }
    .cell:disabled { cursor: default; opacity: 1; }
    .cell.x { color: #e94560; }
    .cell.o { color: #4ade80; }

    #new-game {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    #new-game:hover { background: var(--accent-hover); }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, body { transition: none !important; }
      .cell:hover:not(:disabled) { transform: none; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <button id="theme-toggle" aria-live="polite">
    <span aria-hidden="true" id="theme-icon">☀️</span>
    <span id="theme-label">Switch to light mode</span>
  </button>

  <nav id="sidebar" aria-label="Game history">
    <h2 id="sidebar-heading">Games</h2>
  </nav>

  <main id="main" tabindex="-1">
    <h1>Tic Tac Toe</h1>
    <p id="game-title" aria-label="Current game name"></p>

    <div
      id="status"
      role="status"
      aria-live="polite"
      aria-atomic="true">Press "New Game" to start</div>

    <div
      id="board"
      role="grid"
      aria-label="Tic Tac Toe board"
      aria-describedby="status">
    </div>

    <button id="new-game">New Game</button>
  </main>

  <script>
    const CELL_NAMES = [
      'top-left',    'top-center',    'top-right',
      'middle-left', 'middle-center', 'middle-right',
      'bottom-left', 'bottom-center', 'bottom-right'
    ];

    let gameId = null;

    const statusEl  = document.getElementById('status');
    const boardEl   = document.getElementById('board');
    const titleEl   = document.getElementById('game-title');
    const sidebarEl = document.getElementById('sidebar');
    const html      = document.documentElement;

    // ── Theme ──
    const saved = localStorage.getItem('theme') || 'dark';
    setTheme(saved, false);

    function setTheme(theme, announce = true) {
      html.setAttribute('data-theme', theme);
      const isDark = theme === 'dark';
      document.getElementById('theme-icon').textContent   = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent  = isDark
        ? 'Switch to light mode'
        : 'Switch to dark mode';
      localStorage.setItem('theme', theme);
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
      setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ── Helpers ──
    function statusLabel(s, currentPlayer) {
      if (s === 'IN_PROGRESS') return `Player ${currentPlayer}'s turn`;
      if (s === 'DRAW')        return "Game over: it's a draw!";
      return `Game over: player ${s[0]} wins!`;
    }

    function cellLabel(name, val) {
      return val ? `${name}, ${val}` : `${name}, empty`;
    }

    // ── Board rendering ──
    function renderBoard(data) {
      gameId = data.id;
      titleEl.textContent      = data.name;
      titleEl.setAttribute('aria-label', `Current game: ${data.name}`);
      document.title           = `Tic Tac Toe – ${data.name}`;

      // Build a row-per-three-cells grid for correct ARIA grid semantics
      boardEl.innerHTML = '';
      [0, 1, 2].forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.setAttribute('role', 'row');
        [0, 1, 2].forEach(col => {
          const i   = row * 3 + col;
          const val = data.board[i];
          const btn = document.createElement('button');
          btn.className  = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
          btn.setAttribute('role', 'gridcell');
          btn.setAttribute('aria-label', cellLabel(CELL_NAMES[i], val));
          btn.textContent = val;

          const playable = !val && data.status === 'IN_PROGRESS';
          btn.disabled = !playable;
          if (playable) btn.addEventListener('click', () => makeMove(i));

          rowEl.appendChild(btn);
        });
        boardEl.appendChild(rowEl);
      });

      statusEl.textContent = statusLabel(data.status, data.currentPlayer);
      refreshSidebar();
    }

    // ── Sidebar ──
    async function refreshSidebar() {
      const res   = await fetch('/api/game');
      const games = await res.json();

      sidebarEl.innerHTML = '<h2 id="sidebar-heading">Games</h2>';
      if (games.length === 0) {
        const empty = document.createElement('p');
        empty.style.cssText = 'font-size:0.85rem;color:var(--text-muted);padding:0.25rem 0';
        empty.textContent = 'No games yet.';
        sidebarEl.appendChild(empty);
        return;
      }

      games.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'game-entry';
        btn.setAttribute('aria-current', g.id === gameId ? 'true' : 'false');

        const date = new Date(g.startDate).toLocaleDateString(undefined, {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        const statusText = g.status.replace('_', ' ').toLowerCase();
        btn.setAttribute('aria-label', `Resume game ${g.name}, started ${date}, status: ${statusText}`);

        btn.innerHTML = `
          <div class="game-name" aria-hidden="true">${g.name}</div>
          <div class="game-meta" aria-hidden="true">${date}</div>
          <span class="game-badge badge-${g.status}" aria-hidden="true">${g.status.replace('_', ' ')}</span>`;

        btn.addEventListener('click', () => loadGame(g.id));
        sidebarEl.appendChild(btn);
      });
    }

    async function loadGame(id) {
      const res  = await fetch(`/api/game/${id}`);
      const data = await res.json();
      renderBoard(data);
      document.getElementById('main').focus();
    }

    async function newGame() {
      const res  = await fetch('/api/game/new', { method: 'POST' });
      const data = await res.json();
      renderBoard(data);
      document.getElementById('main').focus();
    }

    async function makeMove(position) {
      if (!gameId) return;
      const res  = await fetch(`/api/game/${gameId}/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ position })
      });
      const data = await res.json();
      renderBoard(data);
    }

    document.getElementById('new-game').addEventListener('click', newGame);
    refreshSidebar();
  </script>
</body>
</html>
